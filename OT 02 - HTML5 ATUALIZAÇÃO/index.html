<!DOCTYPE html>
<html lang= "pt-br" >
<head>
<meta charset="UTF-8">
<meta name= "description" content="Site de inscrição para o evento tech 2024">
<meta name= "Keywords" content="Inscrição, Evento,">
<meta name="author" content= "Escola Sistêmica">
<meta name= "viewport" content= "widht=device-widht, initial-scale=1.0">
<title>Inscrição para o Evento Tech 2024</title>
<link rel="stylesheet" type="text/css" href="css/site.css">
</head>
<body>
	<section>
		<h2>Inscrição para o Evento Tech 2024</h2>
		<p>Complete o fomulário abaixo para se inscrever no evento:</p>
		<form name="frminscricao" method="get" action="#">
			<fieldset class="inscricao">
				<legend>Dados pessoais:</legend>
				<label for="nome">Nome:</label>
				<input type="text" name="txtnome" id="nome">
				<label for="fone">Telefone:</label>
				<input type="text" name="txtfone" id="fone">
				<label for="email">E-mail:</label>
				<input type="email" name="txtmail" id="email">
        		<label for ="senha">Senha:</label>
       			<input type="password" name="txtsenha" id="senha">
       			<label for="idade">Idade:</label>
        		<input type="text" name="txtidade" id="idade">
				<label for="date">Data de nascimento:</label>
				<input type="date" name="txtdata" id="data">
			</fieldset>
			<fieldset class="preferencias">
				<legend>Preferências do Evento:</legend>
				<label for="temaDeInteresse">Tema de interesse:</label>
        			<select name="seleTema" id="tema">
						<option value="">Selecione um tema de interesse</option>
						<option value="RE">Front-end</option>
						<option value="SU">Back-end</option>
						<option value="PR">Full Stack</option>
						<option value="PR">Ciência de Dados</option>
					</select>
				<label for="workshop"><br>Workshops:<br></label>
				<input type="checkbox" name="opcao1" value="1">
				<label for="opcao1">Desenvolvimento Web Moderno<br></label>
				<input type="checkbox" name="opcao2" value="2">
				<label for="opcao2">Introdução à Inteligência Artificial<br></label>
				<input type="checkbox" name="opcao3" value="3">
				<label for="opcao3">Segurança na Internet</label>
			</fieldset>
			<fieldset class="final">
				<legend>Submissão de Apresentação:</legend>
				<label for="titulo">Título:</label>
				<input type="title" name="txttitulo" id="titulo">
				<label for="resumo">Resumo:</label>
				<textarea name="txaresumo" id="resumo"></textarea>
				<label for="ficheiro">Anexar PDF:</label>
				<input type="file" name="txtficheiro" id="ficheiro">
			</fieldset>
			<fieldset class="botao">
				<button type="submit">Enviar inscrição</button>
			</fieldset>
		</form>
	</section>
	<footer>&copy;2024 Evento Tech. Todos os direitos reservados.</footer>
</body>
</html>
